service: ruby-api

image: ghcr.io/<%= ENV.fetch("GITHUB_REPOSITORY") %>/ruby-api

servers:
  web:
    hosts:
      - <%= ENV.fetch("DEPLOY_HOST") %>

registry:
  server: ghcr.io
  username: <%= ENV.fetch("GITHUB_ACTOR") %>

  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RACK_ENV: production
    PORT: "3000"
    WEB_CONCURRENCY: "2"
    APP_NAME: ruby-api

  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - ALLOWED_ORIGINS

ssh:
  user: ubuntu

proxy:
  ssl: true
  host: <%= ENV.fetch("DEPLOY_DOMAIN") %>

  app_port: 3000

  healthcheck:
    path: /health/ready
    interval: 10
    timeout: 5

accessories:
  db:
    image: postgres:16-alpine

    host: <%= ENV.fetch("DEPLOY_HOST") %>

    port: "127.0.0.1:5432:5432"

    env:
      clear:
        POSTGRES_DB: ruby_api_production

      secret:
        - POSTGRES_USER
        - POSTGRES_PASSWORD

    files:
      - config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    directories:
      - data:/var/lib/postgresql/data

builder:
  arch: amd64

  dockerfile: app/Dockerfile

  context: app

  args:
    APP_VERSION: <%= ENV.fetch("APP_VERSION", "unknown") %>
    GIT_SHA: <%= ENV.fetch("APP_VERSION", "unknown") %>

  cache:
    type: gha

asset_path: /app/public