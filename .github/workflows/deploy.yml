###############################################################################
# .github/workflows/deploy.yml
# Triggered on push to main (after CI passes):
#   build → push GHCR → kamal deploy (zero-downtime)
###############################################################################

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:          # Allow manual deploys from Actions UI
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress deploy

env:
  RUBY_VERSION:    "3.3.0"
  REGISTRY:        ghcr.io
  IMAGE_NAME:      ${{ github.repository }}/ruby-api

jobs:
  # ── Gate: CI must pass ────────────────────────────────────────────────────
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: CI gate (deploy only after CI passes)
        run: echo "CI passed — proceeding to deploy"

  # ── Build & push image ────────────────────────────────────────────────────
  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write         # Required to push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short          # e.g. a1b2c3d
            type=ref,event=branch                  # e.g. main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    app
          file:       app/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ── Deploy via Kamal ──────────────────────────────────────────────────────
  deploy:
    name: Kamal deploy → EC2
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://${{ vars.DEPLOY_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install Kamal
        run: gem install kamal --no-document

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          # Trust EC2 host (avoids interactive prompt)
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Kamal deploy
        working-directory: deploy
        env:
          # Registry auth
          GITHUB_ACTOR:            ${{ github.actor }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:       ${{ github.repository }}

          # Target server
          DEPLOY_HOST:   ${{ secrets.DEPLOY_HOST }}
          DEPLOY_DOMAIN: ${{ vars.DEPLOY_DOMAIN }}

          # App secrets (stored as GitHub Actions secrets)
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          POSTGRES_USER:   ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

          # Image version
          APP_VERSION: ${{ needs.build.outputs.image_tag }}

        run: |
          kamal deploy --version=${{ needs.build.outputs.image_tag }}

      - name: Smoke test deployed app
        run: |
          sleep 5
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${{ vars.DEPLOY_DOMAIN }}/health/ready" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Deployment healthy (HTTP $STATUS)"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         '🚨 **Deploy failed** for `${{ github.sha }}`. Check [Actions logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
            })
