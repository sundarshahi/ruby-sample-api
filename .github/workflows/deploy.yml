name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true

      # Install dependencies (including kamal)
      - name: Install dependencies
        working-directory: app
        run: bundle install

      # AWS OIDC auth
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/deploy
          aws-region: ap-south-1

      # Deploy
      - name: Deploy
        run: bundle exec kamal deploy -c ../deploy/config/deploy.yml
        working-directory: ./app
