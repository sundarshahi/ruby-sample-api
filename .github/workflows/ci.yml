###############################################################################
# .github/workflows/ci.yml
# Runs on every push and PR:  lint → test → security scan → docker build check
###############################################################################

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: "3.4.9"

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: RuboCop lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: app

      - name: Run RuboCop
        run: bundle exec rubocop --format github
        working-directory: app

  # ── 2. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: RSpec tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: app

      - name: Run migrations
        working-directory: app
        env:
          RACK_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost/app_test
          SKIP_DB_CHECK: "1"
        run: bundle exec rake db:migrate

      - name: Run specs
        working-directory: app
        env:
          RACK_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost/app_test
          SKIP_DB_CHECK: "1"
        run: bundle exec rspec spec/ --format progress --format RspecJunitFormatter --out rspec-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspec-results
          path: app/rspec-results.xml

  # ── 3. Security scan ─────────────────────────────────────────────────────────
  security:
    name: Brakeman + bundle-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: app

      - name: Bundle audit (CVE check)
        working-directory: app
        run: |
          gem install bundler-audit --no-document
          bundle-audit check --update

      - name: Brakeman static analysis
        working-directory: app
        run: |
          gem install brakeman --no-document
          brakeman --no-pager --format json --output brakeman-report.json || true
          brakeman --no-pager --format text

      - name: Upload Brakeman report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brakeman-report
          path: app/brakeman-report.json

  # ── 4. Docker build check (no push on CI) ────────────────────────────────────
  docker-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: app
          file: app/Dockerfile
          push: false
          tags: ruby-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ruby-api:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # warn only — flip to "1" to block on CRITICAL

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
